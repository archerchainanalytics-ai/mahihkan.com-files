<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAHIHKAN | Oracle of Truth — Archer Chain Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void:#030304;--gold:#a6894c;--gold-dim:rgba(166,137,76,0.12);
            --red:#FF0000;--mid:#888890;--white:#f0f0f4;--green:#4caf82;
            --mono:'IBM Plex Mono',monospace;--display:'Cinzel',serif;--body:'Barlow',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--void);color:var(--white);font-family:var(--body);line-height:1.7;overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh;}
        
        .corporate-header{width:100%;padding:15px 40px 5px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);}
        .header-center{font-family:var(--display);font-size:10px;letter-spacing:4px;font-weight:600;}
        .gold-line{width:100%;height:1px;background:var(--gold);opacity:0.6;}

        /* Ticker: Tightened height */
        .ticker-wrapper{width:100%;height:24px;background:#07070a;border-bottom:1px solid rgba(166,137,76,0.2);overflow:hidden;position:relative;display:flex;align-items:center;}
        .ticker-wrapper::before,.ticker-wrapper::after{content:'';position:absolute;top:0;width:100px;height:100%;z-index:2;pointer-events:none;}
        .ticker-wrapper::before{left:0;background:linear-gradient(to right,#07070a 40%,transparent);}
        .ticker-wrapper::after{right:0;background:linear-gradient(to left,#07070a 40%,transparent);}
        .ticker-track{display:flex;align-items:center;white-space:nowrap;will-change:transform;}
        .ticker-track.animating{animation:ticker-scroll linear infinite;}
        @keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
        .ticker-track:hover{animation-play-state:paused;}
        .ticker-item{display:inline-flex;align-items:center;gap:10px;padding:0 32px;height:24px;font-family:var(--mono);border-right:1px solid rgba(166,137,76,0.12);}
        .ticker-symbol{color:var(--gold);font-weight:600;font-size:10px;letter-spacing:0.2em;}
        .ticker-price{color:var(--white);font-size:12px;}
        .ticker-change{font-size:10px;font-weight:500;}
        .up{color:var(--green);}.down{color:var(--red);}
        .ticker-loading{font-family:var(--mono);font-size:9px;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;padding:0 40px;animation:pulse 1.4s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.7}}

        /* Navigation: Symmetrical Layout */
        .site-nav{width:100%;background:#0a0a0d;border-bottom:1px solid rgba(166,137,76,0.3);position:relative;z-index:100;}
        .nav-inner{max-width:1400px;margin:0 auto;height:50px;position:relative;padding:0 40px;}
        .nav-item{position:absolute;top:0;height:100%;}
        
        /* Position Logic: 25% | 50% | 75% */
        .nav-item.products-pos { left: 25%; transform: translateX(-50%); }
        .nav-item.hall-pos { left: 50%; transform: translateX(-50%); }
        .nav-item.services-pos { left: 75%; transform: translateX(-50%); }

        .nav-trigger{display:flex;align-items:center;gap:8px;height:100%;padding:0 20px;font-family:var(--mono);font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);cursor:pointer;border:none;background:none;transition:background 0.2s;white-space:nowrap;}
        .nav-trigger:hover{background:var(--gold-dim);}
        .nav-trigger .chevron{font-size:7px;opacity:0.6;transition:transform 0.2s;display:inline-block;}
        .nav-item:hover .chevron{transform:rotate(180deg);}
        
        .nav-dropdown{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);min-width:280px;background:#0d0d10;border:1px solid rgba(166,137,76,0.25);border-top:2px solid var(--gold);z-index:200;}
        .nav-item:hover .nav-dropdown{display:block;}
        .nav-dropdown a{display:block;padding:14px 24px;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mid);text-decoration:none;border-bottom:1px solid rgba(166,137,76,0.08);transition:color 0.2s,background 0.2s;}
        .nav-dropdown a:hover{color:var(--gold);background:var(--gold-dim);}
        .nav-dropdown a:last-child{border-bottom:none;}
        .dd-label{display:block;padding:10px 24px 6px;font-family:var(--mono);font-size:7px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(166,137,76,0.4);border-bottom:1px solid rgba(166,137,76,0.1);}
        .nav-item.hor .nav-dropdown{min-width:340px;}

        header{text-align:center;margin:80px 0 100px;}
        .brand-logo{font-family:var(--display);font-size:clamp(4rem,10vw,7rem);letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;font-weight:400;margin-bottom:40px;}
        .quote-container{max-width:800px;margin:0 auto;text-align:center;padding:0 40px;}
        .red-quote{color:var(--red);font-family:var(--mono);font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase;line-height:1.8;display:block;}
        .quote-attribution{display:block;text-align:right;color:var(--red);font-family:var(--mono);font-size:0.75rem;margin-top:15px;letter-spacing:0.12em;}
        .content-body{max-width:900px;margin:100px auto 120px;padding:0 60px;flex-grow:1;}
        .article-box h2{font-family:var(--display);font-size:2.2rem;letter-spacing:0.1em;color:var(--gold);margin-bottom:60px;text-transform:uppercase;text-align:center;line-height:1.4;}
        .article-box p{font-weight:300;line-height:2.4;letter-spacing:0.08em;font-size:1.15rem;color:var(--mid);margin-bottom:40px;text-align:justify;}
        
        footer{width:100%;padding:0 40px 20px;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-top:auto;}
        .footer-line{width:100%;height:1px;background:var(--gold);opacity:0.6;margin-bottom:12px;}
        .footer-content{display:flex;justify-content:space-between;align-items:center;}
        .footer-center{font-family:var(--display);font-size:9px;letter-spacing:3px;}
        a{color:inherit;text-decoration:none;}
    </style>
</head>
<body>

        <span class="ticker-loading">Fetching live market data…</span>

</div>

    <div
